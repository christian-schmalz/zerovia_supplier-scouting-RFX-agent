services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sleep infinity

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: zerovia
      POSTGRES_PASSWORD: zerovia
      POSTGRES_DB: zerovia
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerovia"]
      interval: 3s
      timeout: 3s
      retries: 10
